name: Agentes Diários — Agência de Sites

on:
  schedule:
    # Agente 1 — Prospecção: 08h00 BRT (11:00 UTC)
    - cron: '0 11 * * *'
    # Agente 2 — Geração: 09h00 BRT (12:00 UTC)
    - cron: '0 12 * * *'
    # Agente 3 — Relatório: 10h00 BRT (13:00 UTC)
    - cron: '0 13 * * *'
  # Permite rodar manualmente pelo GitHub
  workflow_dispatch:
    inputs:
      agente:
        description: 'Qual agente rodar?'
        required: true
        default: 'todos'
        type: choice
        options:
          - todos
          - prospectar
          - gerar-sites
          - relatorio

jobs:
  agente-prospeccao:
    name: 'Agente 1 — Prospecção'
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.agente == 'todos' || github.event.inputs.agente == 'prospectar') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rodar Agente de Prospecção
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node agents/01-prospectar.js

  agente-geracao:
    name: 'Agente 2 — Geração de Sites'
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.agente == 'todos' || github.event.inputs.agente == 'gerar-sites') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rodar Agente Gerador de Sites
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: node agents/02-gerar-sites.js

  agente-relatorio:
    name: 'Agente 3 — Relatório'
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (github.event.inputs.agente == 'todos' || github.event.inputs.agente == 'relatorio') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 13 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Rodar Agente de Relatório
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CALLMEBOT_PHONE: ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY: ${{ secrets.CALLMEBOT_APIKEY }}
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: node agents/03-relatorio.js
